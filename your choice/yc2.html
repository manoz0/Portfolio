<!DOCTYPE html>
<html>
<head>
    <title>Cafe & Burger House</title>
    <link rel="stylesheet" href="./yc2.css">
</head>
<body>

<header>
    <h1>☕ Cafe & Burger House </h1>
    <nav>
        <a href="#menu">Menu</a>
        <a href="#order">Order</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="menu">
    <h2>Our Menu</h2>
    <div class="menu-item">
        <h3>Classic Burger</h3>
        <p>₹150</p>
    </div>
    <div class="menu-item">
        <h3>Cheese Burger</h3>
        <p>₹180</p>
    </div>
    <div class="menu-item">
        <h3>Cold Coffee</h3>
        <p>₹120</p>
    </div>
</section>

<section id="order">
    <h2>Place Order</h2>
    <form id="orderForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="item" placeholder="Item Name" required>
        <input type="number" id="quantity" placeholder="Quantity" required>
        <button type="submit">Order Now</button>
    </form>
    <p id="orderMessage"></p>
</section>

<section id="contact">
    <h2>Contact Us</h2>
    <form id="contactForm">
        <input type="text" id="contactName" placeholder="Your Name" required>
        <input type="email" id="email">
        <textarea id="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
    <p id="contactMessage"></p>
</section>

<script src="script.js"></script>
</body>
</html>
